{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
  <div class="flash-stack" aria-live="polite">
    {% for category, message in messages %}
    <div class="alert alert--{{ 'success' if category == 'success' else 'error' }}">
      {{ message }}
    </div>
    {% endfor %}
  </div>
  {% endif %}
{% endwith %}
