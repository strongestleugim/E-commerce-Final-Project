<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Snake</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <div class="panel__header">
        <div>
          <p class="eyebrow">Classic Mode</p>
          <h1>Snake</h1>
        </div>
        <button id="restart-button" class="button" type="button">Restart</button>
      </div>
      <div class="status">
        <p>Score: <span id="score">0</span></p>
        <p id="status-text">Use arrow keys or WASD to start.</p>
      </div>
      <div class="board-wrap">
        <div id="board" class="board" role="grid" aria-label="Snake game board"></div>
      </div>
      <div class="controls" aria-label="Touch controls">
        <button class="button control control--up" data-direction="up" type="button">Up</button>
        <button class="button control control--left" data-direction="left" type="button">Left</button>
        <button class="button control control--down" data-direction="down" type="button">Down</button>
        <button class="button control control--right" data-direction="right" type="button">Right</button>
      </div>
      <p class="help">Move with arrow keys or WASD. Press space to pause. Restart after game over.</p>
    </section>
  </main>
  <script type="module" src="./src/app.js"></script>
</body>
</html>
